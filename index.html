<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groups Community - Download</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            --bg-dark: #0f0c1b;
            --card-glass: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Background Glow */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary-grad);
            filter: blur(120px);
            border-radius: 50%;
            opacity: 0.3;
            z-index: -1;
        }

        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: #1e1b4b;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.3);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 60%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #9ca3af;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary-grad);
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--card-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="app-icon">
            <i class="fab fa-whatsapp"></i>
        </div>
        <h1>Groups Community</h1>
        <p>Choose an option below to proceed</p>
        
        <div class="btn-list">
            <a href="https://play.google.com/store/apps/details?id=com.groupscommunity.android" target="_blank" rel="noopener" class="btn btn-primary">
                <i class="fab fa-google-play"></i> Download Application
            </a>
            
            <a href="https://azeemlabs.github.io/portfolio" target="_blank" rel="noopener" class="btn btn-secondary">
                <i class="fas fa-briefcase"></i> View Portfolio
            </a>
        </div>
    </div>

</body>
  </html>
